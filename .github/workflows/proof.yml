name: vrp-proof

on:
  push:
  pull_request:

jobs:
  runtime-proof:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run runtime proof
        run: go run ./cmd/vrp_proof

      - name: Run attack proof
        run: go run ./cmd/vrp_attack_proof